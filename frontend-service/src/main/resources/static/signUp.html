<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/img/logowhite.png" type="image/png" />
  <title>Sign Up — ITBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="/css/login.css" />
  <style>
    .card { max-width: 410px; }
    .card-body { padding: 20px 32px 16px; }
    .card-title { font-size: 20px; margin-bottom: 2px; }
    .card-sub   { font-size: 14px; margin-bottom: 16px; }
    .field { margin-bottom: 11px; }
    .field label { margin-bottom: 5px; }
    .input-wrap input { padding-top: 10px; padding-bottom: 10px; font-size: 15px; }
    .req-list { margin-top: 7px; gap: 3px; }
    .req-list p { font-size: 10px; }
    .submit-btn { margin-top: 14px; padding: 12px; font-size: 14px; }
    .card-footer { padding: 11px 32px 16px; }
    .card-footer p { font-size: 14px; }
    .brand { flex-direction: row; align-items: center; margin-bottom: 18px; }
    .brand-logo { width: 34px; height: 34px; margin-bottom: 0; }
    .brand-name { font-size: 20px; }
    .brand-tagline { display: none; }
    .page-footer { margin-top: 14px; }
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="brand">
    <div class="brand-logo">
      <img src="/img/logowhite.png" alt="ITBook" />
    </div>
    <div class="brand-name">IT<span>Book</span></div>
  </a>
  <div class="card">
    <div class="card-accent"></div>
    <div class="tabs">
      <a href="login.html" class="tab">Log In</a>
      <a href="signUp.html" class="tab active">Sign Up</a>
    </div>
    <div class="card-body">
      <h1 class="card-title">Create account</h1>
      <p class="card-sub">Join thousands of students on ITBook</p>
      <form id="signupForm" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <span class="icon"><i class="fas fa-envelope"></i></span>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Your email"
                    required
                    autocomplete="email"
            />
          </div>
        </div>
        <div class="field">
          <label for="fullName">Full Name</label>
          <div class="input-wrap">
            <span class="icon"><i class="fas fa-user"></i></span>
            <input
                    type="text"
                    id="fullName"
                    name="fullName"
                    placeholder="Your full name"
                    required
                    autocomplete="name"
            />
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a password"
                    required
                    autocomplete="new-password"
            />
            <button type="button" class="toggle-pass" id="togglePassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="req-list">
            <p id="req-length"><i class="fas fa-times-circle"></i> At least 8 characters</p>
            <p id="req-case"><i class="fas fa-times-circle"></i> Uppercase &amp; lowercase</p>
            <p id="req-symbols"><i class="fas fa-times-circle"></i> Number &amp; symbol</p>
          </div>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Repeat your password"
                    required
                    autocomplete="new-password"
            />
            <button type="button" class="toggle-pass" id="toggleConfirmPassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn">
          Create Account &nbsp;<i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>
    <div class="card-footer">
      <p>Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>
  <p class="page-footer">© 2026 ITBook</p>
</div>
<script src="/js/signup.js"></script>
</body>
</html>
