<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/img/logowhite.png" type="image/png" />
  <title>Log In — ITBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="page">
  <a href="/" class="brand">
    <div class="brand-logo">
      <img src="/img/logowhite.png" alt="ITBook" />
    </div>
    <div class="brand-name">IT<span>Book</span></div>
    <span class="brand-tagline">Learn · Build · Excel</span>
  </a>
  <div class="card">
    <div class="card-accent"></div>
    <div class="tabs">
      <a href="login.html" class="tab active">Log In</a>
      <a href="signUp.html" class="tab">Sign Up</a>
    </div>
    <div class="card-body">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Log in to your ITBook account</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope icon"></i>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email"
                    required
                    autocomplete="email"
            />
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock icon"></i>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                    autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" id="togglePassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <a href="resetPassword.html" class="forgot">Forgot password?</a>
        <button type="submit" class="submit-btn">
          Log In &nbsp;<i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>
    <div class="card-footer">
      <p>No account? <a href="signUp.html">Create one</a></p>
    </div>
  </div>
  <p class="page-footer">© 2026 ITBook</p>
</div>
<script src="/js/login.js"></script>
</body>
</html>
